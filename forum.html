<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameLab Forum</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="forum.css">
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <div class="brand-group">
        <a class="brand" href="index.html" aria-label="Go to main page">
          <div class="logo" aria-label="GameLab logo">
            <span class="logo-g">G</span>
            <span class="logo-shape"></span>
          </div>
          <div>
            <h1>GameLab</h1>
            <p>Premium assets for indie and AAA game projects.</p>
          </div>
        </a>
      </div>

      <form class="search-wrap" role="search" aria-label="Search assets" action="index.html" method="get">
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
            <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </span>
        <input class="search-input" type="search" name="search" placeholder="Search assets, tools, categories..." aria-label="Search assets by name or category">
        <button class="search-btn" type="submit">Search</button>
      </form>

      <nav class="top-nav" aria-label="Main navigation">
        <a class="btn btn-nav" href="games.html">Games</a>
        <a class="btn btn-nav" href="forum.html">Forum</a>
        <a class="btn btn-nav" href="study.html">Study materials</a>
      </nav>

      <a class="account-link" href="profile.html" aria-label="Open account">
        <span class="account-icon" aria-hidden="true"></span>
      </a>
    </div>
  </header>

  <main class="forum-page">
    <section class="forum-layout">
      <aside class="forum-sidebar" aria-label="Online users">
        <h2>Online Users</h2>
        <div class="online-list" id="online-list"></div>
        <p class="online-count" id="online-count">0 users online</p>
      </aside>

      <section class="forum-main" aria-label="General chat">
        <div class="chat-header">
          <h2>General Chat</h2>
          <span class="chat-status">
            <span class="online-dot"></span>
            Live
          </span>
        </div>

        <div class="chat-pinned" id="chat-pinned" hidden></div>

        <div class="chat-messages" id="chat-messages"></div>

        <p class="chat-auth-hint" id="chat-auth-hint" hidden>
          <a href="auth.html">Sign in</a> to send messages.
        </p>

        <form class="chat-input-form" id="chat-form">
          <div class="chat-input-wrap">
            <div class="chat-input-row">
              <button
                type="button"
                class="emoji-toggle"
                id="emoji-toggle"
                aria-label="Insert emoji"
                aria-expanded="false"
                aria-controls="emoji-panel"
              >😊</button>
              <input
                type="text"
                class="chat-input"
                id="chat-input"
                placeholder="Type a message..."
                maxlength="500"
                autocomplete="off"
              >
            </div>
            <div class="emoji-panel" id="emoji-panel" role="menu" aria-label="Emoji picker" hidden></div>
          </div>
          <button class="btn btn-send" type="submit">Send</button>
        </form>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-copy">© 2026 GameLab. All rights reserved.</p>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
        <a href="#">Support</a>
      </nav>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script src="forum.js"></script>
</body>
</html>
