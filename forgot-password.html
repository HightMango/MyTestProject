<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameLab - Forgot Password</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="forgot-password.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-shell" aria-label="Password recovery">
      <a class="back-link" href="auth.html">&larr; Back to login</a>

      <header class="auth-head">
        <h1>Forgot Password</h1>
        <p>Enter the email address associated with your account and we'll send you a link to reset your password.</p>
      </header>

      <form class="form-block" id="forgot-form" action="#" method="post">
        <label for="forgot-email">Email</label>
        <input id="forgot-email" type="email" name="email" placeholder="you@example.com" autocomplete="email" required>

        <button class="btn btn-primary" type="submit">Send Reset Link</button>
        <p class="form-feedback" id="forgot-feedback" aria-live="polite"></p>
      </form>

      <div class="help-text">
        <p>Remember your password? <a href="auth.html">Sign in</a></p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-copy">© 2026 GameLab. All rights reserved.</p>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Support</a>
      </nav>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
